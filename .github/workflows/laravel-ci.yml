name: Laravel CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  tests:
    name: Tests (MySQL 8)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENV: testing
      APP_KEY: base64:qyqMH2AWFpTtI3d7qzEtKFoX4ZEIChK5p0STvcGdL+U=
      BCRYPT_ROUNDS: 4
      CACHE_STORE: array
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: idcsystem_test
      DB_USERNAME: root
      DB_PASSWORD: root
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: idcsystem_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, mysql, zip, gd, intl, curl, openssl, pcntl
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database storage/framework/cache storage/framework/sessions storage/framework/views storage/logs

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --no-interaction --prefer-dist --no-progress

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run test suite
        run: php artisan test
