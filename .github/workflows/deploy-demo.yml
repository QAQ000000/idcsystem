name: Deploy Demo

on:
  workflow_run:
    workflows:
      - Laravel CI
    branches:
      - master
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: demo-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to demo server
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_DEMO_DEPLOY == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    timeout-minutes: 20

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      APP_URL: ${{ secrets.DEMO_APP_URL }}
      APP_KEY: ${{ secrets.DEMO_APP_KEY }}
      DB_HOST: ${{ secrets.DEMO_DB_HOST }}
      DB_PORT: ${{ secrets.DEMO_DB_PORT || '3306' }}
      DB_DATABASE: ${{ secrets.DEMO_DB_DATABASE }}
      DB_USERNAME: ${{ secrets.DEMO_DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DEMO_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$APP_URL"
          test -n "$APP_KEY"
          test -n "$DB_HOST"
          test -n "$DB_DATABASE"
          test -n "$DB_USERNAME"
          test -n "$DB_PASSWORD"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust demo server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release files
        run: |
          rsync -az --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".env" \
            --exclude="vendor" \
            --exclude="node_modules" \
            --exclude="storage" \
            -e "ssh -p $DEPLOY_PORT" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Write demo environment
        run: |
          cat > .env.deploy <<EOF
          APP_NAME=IDCSystem
          APP_ENV=production
          APP_KEY=$APP_KEY
          APP_DEBUG=false
          APP_URL=$APP_URL

          LOG_CHANNEL=stack
          CACHE_STORE=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync

          DB_CONNECTION=mysql
          DB_HOST=$DB_HOST
          DB_PORT=$DB_PORT
          DB_DATABASE=$DB_DATABASE
          DB_USERNAME=$DB_USERNAME
          DB_PASSWORD=$DB_PASSWORD
          EOF
          scp -P "$DEPLOY_PORT" .env.deploy "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"

      - name: Install and release
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader && \
            php artisan migrate --force && \
            php artisan storage:link || true && \
            php artisan config:cache && \
            php artisan route:cache && \
            php artisan view:cache"
