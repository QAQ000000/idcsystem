[program:idcsystem-horizon]
process_name=%(program_name)s
command=php /var/www/idcsystem/artisan horizon
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/idcsystem/storage/logs/horizon.log
stopwaitsecs=3600

[program:idcsystem-scheduler]
process_name=%(program_name)s
command=php /var/www/idcsystem/artisan schedule:work
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/idcsystem/storage/logs/scheduler.log
