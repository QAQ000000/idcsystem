[program:idcsystem-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/idcsystem/artisan queue:work redis --queue=notifications,default --sleep=3 --tries=3 --timeout=120
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/idcsystem/storage/logs/worker.log
stopwaitsecs=3600

[program:idcsystem-scheduler]
process_name=%(program_name)s
command=php /var/www/idcsystem/artisan schedule:work
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/idcsystem/storage/logs/scheduler.log

